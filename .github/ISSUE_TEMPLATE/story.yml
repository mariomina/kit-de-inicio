name: Story
description: Da seguimiento a una parte de valor visible para el usuario.
labels: ["story", "needs-triage"]
body:
  - type: textarea
    id: user
    attributes:
      label: Objetivo del usuario
      description: ¿Qué necesita lograr el usuario?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Valor
      description: ¿Por qué esto importa?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptación
      description: Define claramente el comportamiento esperado.
    validations:
      required: true
