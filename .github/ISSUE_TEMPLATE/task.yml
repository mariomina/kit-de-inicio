name: Task
description: Da seguimiento a trabajo interno de implementación.
labels: ["task", "needs-triage"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Resultado
      description: ¿Qué resultado debe producir esta tarea?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: ¿Por qué existe esta tarea?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definición de terminado
      description: ¿Qué debe ser cierto para cerrar esta tarea?
    validations:
      required: true
