name: Bug report
description: Reporta un bug en el proyecto.
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: ¿Qué pasó?
      description: Describe el bug con claridad.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impacto
      description: ¿A quién afecta y qué tan grave es?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Pasos mínimos para reproducir el problema.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Entorno
      description: Navegador, sistema operativo, versión de la app o detalles relevantes del runtime.
