name: Feature request
description: Sugiere una mejora o nueva capacidad.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema quieres resolver?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe la solución que te gustaría
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Otras opciones que evaluaste antes de llegar aquí.
  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptación
      description: ¿Qué debe ser cierto para considerar esto terminado?
    validations:
      required: true
