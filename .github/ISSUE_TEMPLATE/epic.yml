name: Epic
description: Da seguimiento a un bloque grande de trabajo que abarca varias stories.
labels: ["epic", "needs-triage"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objetivo
      description: ¿Qué resultado de negocio debe lograr este epic?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Alcance
      description: ¿Qué incluye y qué no incluye?
    validations:
      required: true
  - type: textarea
    id: stories
    attributes:
      label: Stories
      description: Lista las stories hijas o hitos.
    validations:
      required: true
